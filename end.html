<!DOCTYPE html>

<html lang="zh-CN">

<head>

<meta charset="UTF-8" />

<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>End</title>

<style>

*{box-sizing:border-box;margin:0;padding:0}

html,body{width:100%;height:100%;background:#000;overflow:hidden}

body{font-family:'Press Start 2P','Courier New',monospace}

#stage,#finalBlack,#posterLayer,#dialogLayer,#chooseAgain{position:fixed;inset:0}

#stage{display:flex;align-items:center;justify-content:center;background:#000}

#stage img{width:100%;height:100%;object-fit:cover;display:block}

#chooseAgain{z-index:2;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 700ms ease;pointer-events:none;color:#fff;font-family:"Arial Black","Microsoft YaHei UI","Microsoft YaHei",sans-serif;font-size:clamp(40px,6vw,92px);font-weight:900;letter-spacing:.08em;text-transform:uppercase;text-shadow:none}

#dialogLayer{z-index:3;display:flex;align-items:flex-end;justify-content:center;padding:0 0 4vh;opacity:0;transition:opacity 900ms ease;pointer-events:none}

#dialogLayer.show{opacity:1;pointer-events:auto}

#dialogFrame{position:relative;width:min(82vw,1080px);opacity:0;transform:translateY(14px);transition:opacity 850ms ease,transform 850ms ease}

#dialogLayer.show #dialogFrame{opacity:1;transform:translateY(0)}

#dialogFrame img{width:100%;height:auto;display:block}

#dialogText{position:absolute;left:8%;top:37%;width:84%;color:#231d24;font-family:"Arial Black","Microsoft YaHei UI","Microsoft YaHei",sans-serif;font-size:clamp(18px,1.45vw,28px);line-height:1;font-weight:900;letter-spacing:.02em;white-space:nowrap;text-align:center;opacity:0;transform:translateY(8px);transition:opacity 1050ms ease,transform 1050ms ease}

#endScrollBlack{position:fixed;inset:0;background:#000;opacity:0;transition:opacity 800ms ease;z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.9em;pointer-events:none}
.end-line{opacity:0;transform:translateY(10px);transition:opacity 1200ms ease,transform 1200ms ease;font-family:"Arial Black","Microsoft YaHei UI","Microsoft YaHei",sans-serif;font-size:clamp(18px,2.2vw,36px);font-weight:900;color:#fff;letter-spacing:.06em;text-align:center;line-height:1.3}
.end-line.show{opacity:1;transform:translateY(0)}
.end-blue{color:#4aa3ff;}

#dialogLayer.show #dialogText{opacity:1;transform:translateY(0)}

#finalBlack{background:#000;opacity:0;transition:opacity 1800ms ease;z-index:4;pointer-events:none}

#posterLayer{z-index:6;background:#000;opacity:0;transition:opacity 1200ms ease;overflow:hidden}

#posterStage{position:absolute;inset:0;overflow:hidden}

#posterVisual{position:absolute;inset:0;transform:translate3d(0,0,0);transition:transform 18000ms linear;will-change:transform}

#posterVisual.lift{transform:translate3d(0,-120vh,0)}

#posterImg{width:100%;height:100%;object-fit:cover;display:block;transform:translate3d(0,0,0) scale(1)}

#posterImg.music-shake{animation:posterMusicShake 680ms ease-in-out infinite;transform-origin:center center;will-change:transform}

#creditsMask{position:absolute;left:0;right:0;bottom:0;height:44vh;background:linear-gradient(180deg,rgba(0,0,0,0) 0%,rgba(0,0,0,.42) 14%,rgba(0,0,0,.84) 34%,#000 100%);opacity:0;transition:opacity 1600ms ease;pointer-events:none;z-index:7}

#creditsMask.show{opacity:1}

#creditsViewport{position:absolute;left:50%;bottom:0;width:min(760px,86vw);height:38vh;transform:translateX(-50%);overflow:hidden;opacity:0;transition:opacity 1800ms ease;pointer-events:none;z-index:8}

#creditsViewport.show{opacity:1}

#creditsTrack{position:absolute;left:0;right:0;bottom:-110%;display:flex;flex-direction:column;align-items:center;gap:1.1rem;animation:none}

#creditsViewport.show #creditsTrack{animation:creditsRoll 28s linear forwards}

.credit-line{width:100%;text-align:center;color:#f5f5f5;font-family:"Arial Black","Microsoft YaHei UI","Microsoft YaHei",sans-serif;font-weight:900;text-transform:uppercase;text-shadow:0 0 12px rgba(255,255,255,.08)}

.credit-line--title{font-size:clamp(24px,2vw,38px);letter-spacing:.22em}

.credit-line--name{font-size:clamp(16px,1.25vw,22px);letter-spacing:.12em}

#finalCenterThanks{position:absolute;left:50%;top:38%;transform:translate(-50%,-50%) scale(.96);width:min(92vw,1200px);text-align:center;color:#fff;font-family:"Arial Black","Microsoft YaHei UI","Microsoft YaHei",sans-serif;font-size:clamp(42px,6.6vw,118px);font-weight:900;letter-spacing:.18em;opacity:0;transition:opacity 2200ms ease,transform 2200ms ease;pointer-events:none;text-shadow:0 0 24px rgba(255,255,255,.12);z-index:10}

#finalCenterThanks.show{opacity:1;transform:translate(-50%,-50%) scale(1)}

@keyframes posterMusicShake{0%{transform:translate3d(0,0,0) scale(1)}20%{transform:translate3d(.6px,-.8px,0) scale(1.002)}40%{transform:translate3d(-.8px,.5px,0) scale(.999)}60%{transform:translate3d(.7px,.8px,0) scale(1.0025)}80%{transform:translate3d(-.5px,-.7px,0) scale(1.0005)}100%{transform:translate3d(0,0,0) scale(1)}}

@keyframes creditsRoll{0%{transform:translateY(0)}100%{transform:translateY(-180%)}}

</style>

</head>

<body>

<audio id="nostalgicAudio" src="音乐/怀旧.mp3" autoplay loop></audio>
<script>
(function(){
  var a=document.getElementById('nostalgicAudio');
  function tryPlay(){
    if(!a) return;
    var p=a.play();
    if(p&&typeof p.catch==='function') p.catch(function(){});
  }
  tryPlay();
  window.addEventListener('pointerdown',tryPlay,{once:true});
})();
</script>

<audio id="endAudio" src="音乐/end.mp3" loop></audio>

<audio id="whaleAudio" src="音乐/鲸鱼叫声.mp3"></audio>

<div id="stage"><img id="endImg" src="安详.jpg" alt="end sequence" /></div>

<div id="chooseAgain">CHOOSE AGAIN!</div>

<div id="dialogLayer"><div id="dialogFrame"><img src="对话框.png" alt="dialog" /><div id="dialogText">FOR SOME REASON, I KEEP FEELING I SHOULD LEAVE INSTEAD.</div></div></div>
<div id="dialogDim" style="position:fixed;inset:0;z-index:2;background:rgba(0,0,0,0);opacity:0;transition:opacity 600ms ease;pointer-events:none;"></div>

<div id="posterLayer">

  <div id="posterStage">

    <div id="posterVisual"><img id="posterImg" src="结束海报.jpg" alt="ending poster" /></div>

    <div id="creditsMask"></div>

    <div id="creditsViewport">

      <div id="creditsTrack">

        <div class="credit-line credit-line--title">AUTHOR</div>

        <div class="credit-line credit-line--name">KEYIN</div>

        <div class="credit-line credit-line--title">MUSIC</div>

        <div class="credit-line credit-line--name">KEYIN</div>

        <div class="credit-line credit-line--title">ART</div>

        <div class="credit-line credit-line--name">KEYIN</div>

        <div class="credit-line credit-line--title">SPECIAL THANKS</div>

        <div class="credit-line credit-line--name">CURSOR</div>

        <div class="credit-line credit-line--name">JIMENG</div>

        <div class="credit-line credit-line--name">DOUBAO</div>

      </div>

    </div>

    <div id="finalCenterThanks">THANK YOU FOR PLAYING</div>

  </div>

</div>

<div id="finalBlack"></div>
<div id="endScrollBlack">
  <div class="end-line" id="endLine1">YOU NEVER SHOWED UP.</div>
  <div class="end-line" id="endLine2">SOMEONE ELSE TOOK YOUR PLACE.</div>
  <div class="end-line" id="endLine3">BUT AT LEAST, YOU ARE NO LONGER</div>
  <div class="end-line" id="endLine4">ONE OF THE <span class="end-blue">BUTCHERS</span> WHO ENDED ITS LIFE.</div>
</div>

<script>

var baseImages=['安详.jpg','吓哭.jpg','咬住.jpg','咬人.jpg','脚蹼.jpg','图片放置/张嘴.jpg','闭眼.jpg','跟随成功.jpg','水里.jpg','下水.jpg','图片放置/嘴.jpg','眼.jpg','回头.jpg','图片放置/整理.jpg','玩耍.jpg','喂食.jpg','play/play4.jpg','play/play1.jpg','拿起.jpg','ball.jpg','向下.jpg','a.jpg','放大.jpg','虎鲸整体.jpg','水族箱前.jpg','卡车.jpg','跃出海面.jpg','同游.jpg','池底.jpg','图片放置/张嘴2.jpg','流泪.jpg','1.jpg','闭眼2.jpg','图片放置/睁眼.jpg','咬手.jpg','图片放置/桌面.jpg','水族馆通道.jpg'];

var finalImage='水族馆大门.jpg';

var loopSpeeds=[90,90,90,90];

var finalLoopDelay=300;

var finalDialogText='FOR SOME REASON, I KEEP FEELING I SHOULD LEAVE INSTEAD.';

var endAudio=document.getElementById('endAudio');

var nostalgicAudio=document.getElementById('nostalgicAudio');

var whaleAudio=document.getElementById('whaleAudio');

var img=document.getElementById('endImg');

var chooseAgain=document.getElementById('chooseAgain');

var dialogLayer=document.getElementById('dialogLayer');

var dialogFrame=document.getElementById('dialogFrame');

var dialogText=document.getElementById('dialogText');

var dialogDim=document.getElementById('dialogDim');

var finalBlack=document.getElementById('finalBlack');

var endScrollBlack=document.getElementById('endScrollBlack');

var endLine1=document.getElementById('endLine1');
var endLine2=document.getElementById('endLine2');
var endLine3=document.getElementById('endLine3');
var endLine4=document.getElementById('endLine4');

var posterLayer=document.getElementById('posterLayer');

var posterImg=document.getElementById('posterImg');

var posterVisual=document.getElementById('posterVisual');

var creditsMask=document.getElementById('creditsMask');

var creditsViewport=document.getElementById('creditsViewport');

var finalCenterThanks=document.getElementById('finalCenterThanks');

var playbackFinished=false;

var dialogShown=false;

var posterShown=false;

var closing=false;

var dialogSwapTimer=null;

var posterRevealTimer=null;

var posterMotionTimer=null;

var centerThanksTimer=null;

var whaleInterval=null;

var endScrollShown=false;
var endScrollTimer=null;

var sawUpScrollFirst=false;

var downScrollAfterUpCount=0;

function tryPlayAudio(audioEl){if(!audioEl) return;var playPromise=audioEl.play();if(playPromise&&typeof playPromise.catch==='function'){playPromise.catch(function(){});}}

function clearPosterRevealTimer(){if(!posterRevealTimer) return;clearTimeout(posterRevealTimer);posterRevealTimer=null;}

function clearPosterMotionTimer(){if(!posterMotionTimer) return;clearTimeout(posterMotionTimer);posterMotionTimer=null;}

function clearCenterThanksTimer(){if(!centerThanksTimer) return;clearTimeout(centerThanksTimer);centerThanksTimer=null;}

function stopWhaleInterval(){if(!whaleInterval) return;clearInterval(whaleInterval);whaleInterval=null;}

function playWhaleSound(){if(!whaleAudio||closing||!posterShown) return;try{whaleAudio.currentTime=0;}catch(err){}tryPlayAudio(whaleAudio);}

function showFinalCenterThanks(){finalCenterThanks.classList.add('show');}

function startPosterCreditsMotion(){posterImg.classList.remove('music-shake');posterVisual.classList.add('lift');creditsMask.classList.add('show');creditsViewport.classList.add('show');clearCenterThanksTimer();centerThanksTimer=setTimeout(showFinalCenterThanks,18000);}

function startPosterAudioLoop(){
  if(nostalgicAudio){
    nostalgicAudio.loop=true;
    tryPlayAudio(nostalgicAudio);
  }
  if(endAudio){
    endAudio.pause();
    endAudio.currentTime=0;
  }
  playWhaleSound();
  stopWhaleInterval();
  whaleInterval=setInterval(playWhaleSound,6000);
}

function hideDialog(){if(dialogSwapTimer){clearTimeout(dialogSwapTimer);dialogSwapTimer=null;}clearPosterRevealTimer();dialogShown=false;dialogLayer.classList.remove('show');if(dialogDim) dialogDim.style.opacity='0';}

function startPosterSequence(){if(posterShown) return;posterShown=true;clearPosterRevealTimer();chooseAgain.style.opacity='0';endScrollShown=false;endScrollBlack.style.opacity='0';if(endLine1){endLine1.classList.remove('show');endLine2.classList.remove('show');endLine3.classList.remove('show');endLine4.classList.remove('show');}setTimeout(function(){finalBlack.style.opacity='1';hideDialog();setTimeout(function(){posterLayer.style.opacity='1';finalBlack.style.opacity='0';posterImg.classList.add('music-shake');startPosterAudioLoop();clearPosterMotionTimer();posterMotionTimer=setTimeout(startPosterCreditsMotion,8000);},1800);},2000);}

function schedulePosterSequence(text){clearPosterRevealTimer();if(text!==finalDialogText||posterShown) return;posterRevealTimer=setTimeout(function(){startPosterSequence();},2000);}

function showEndScrollText(){
  if(endScrollShown||posterShown) return;
  endScrollShown=true;
  endScrollBlack.style.opacity='1';
  if(endLine1){
    endLine1.classList.add('show');
    setTimeout(function(){ endLine2.classList.add('show'); },700);
    setTimeout(function(){ endLine3.classList.add('show'); },1400);
    setTimeout(function(){ endLine4.classList.add('show'); },2100);
  }
  if(endScrollTimer){clearTimeout(endScrollTimer);}
  endScrollTimer=setTimeout(function(){
    startPosterSequence();
  },8100);
}

function showDialog(text){if(dialogSwapTimer){clearTimeout(dialogSwapTimer);dialogSwapTimer=null;}clearPosterRevealTimer();if(!dialogShown){dialogText.textContent=text;dialogShown=true;dialogLayer.classList.add('show');if(dialogDim) dialogDim.style.opacity='1';schedulePosterSequence(text);return;}dialogLayer.classList.remove('show');if(dialogDim) dialogDim.style.opacity='0';dialogSwapTimer=setTimeout(function(){dialogText.textContent=text;dialogLayer.classList.add('show');if(dialogDim) dialogDim.style.opacity='1';schedulePosterSequence(text);},420);}

function getDownScrollDialogText(){if(sawUpScrollFirst){downScrollAfterUpCount+=1;if(downScrollAfterUpCount===1){return "THAT'S RIGHT!";}}return finalDialogText;}

function playLoop(loopIdx,frameIdx){
  img.src=baseImages[frameIdx];
  var delay=loopIdx<loopSpeeds.length-1?loopSpeeds[loopIdx]:finalLoopDelay;
  if(frameIdx<baseImages.length-1){
    setTimeout(function(){playLoop(loopIdx,frameIdx+1);},delay);
    return;
  }
  if(loopIdx<loopSpeeds.length-1){
    setTimeout(function(){playLoop(loopIdx+1,0);},Math.max(40,delay-20));
    return;
  }
  img.src=finalImage;
  playbackFinished=true;
  chooseAgain.style.opacity='1';
}

function closePage(){if(closing) return;closing=true;clearPosterRevealTimer();clearPosterMotionTimer();clearCenterThanksTimer();stopWhaleInterval();if(endScrollTimer){clearTimeout(endScrollTimer);endScrollTimer=null;}posterImg.classList.remove('music-shake');endAudio.pause();if(nostalgicAudio){nostalgicAudio.pause();}whaleAudio.pause();hideDialog();finalBlack.style.opacity='1';posterLayer.style.opacity='0';chooseAgain.style.opacity='0';setTimeout(function(){window.open('','_self');window.close();},1000);}

window.addEventListener('wheel',function(e){
  if(!playbackFinished||posterShown) return;
  if(e.deltaY>0){
    showEndScrollText();
    return;
  }
  if(e.deltaY<0){
    sawUpScrollFirst=true;
    showDialog('WTF, ARE YOU SUREEEE? SCROLL DOWN.');
  }
},{passive:true});

document.addEventListener('click',function(e){if(!dialogShown||posterShown) return;if(dialogFrame.contains(e.target)) return;hideDialog();});

document.addEventListener('keydown',function(e){
  if(e.code!=='Space'&&e.key!==' ') return;
  e.preventDefault();
  if(posterShown){
    // 结尾流程结束后：按空格进入 table2
    window.location.href='table2.html';
    return;
  }
});

posterImg.addEventListener('error',function(){posterImg.src='水族馆大门.jpg';});

playLoop(0,0);

</script>

</body>

</html>
