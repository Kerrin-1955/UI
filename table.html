<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Click Counter Circle</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: url('图片放置/桌面壁纸.jpg') center/cover no-repeat fixed;
        color: #333;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .hint {
        font-size: 18px;
        color: #555;
        text-align: center;
        line-height: 1.6;
      }

      .hint strong {
        font-weight: 600;
        color: #0c9da3;
      }

      .click-circle {
        position: fixed;
        right: 32px;
        bottom: 32px;
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: #42d1c5; /* 单色浅青绿色小球 */
        display: flex;
        align-items: center;
        justify-content: center;
        color: #ffffff;
        font-size: 24px;
        font-weight: 700;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.16);
        cursor: default;
        user-select: none;
        will-change: transform, box-shadow, filter;
        animation: breathe 2800ms ease-in-out infinite;
      }

      .click-circle::before {
        content: "";
        position: absolute;
        inset: -10px;
        border-radius: 999px;
        background: radial-gradient(
          circle at 50% 35%,
          rgba(255, 255, 255, 0.4) 0,
          rgba(66, 209, 197, 0.4) 40%,
          rgba(66, 209, 197, 0) 80%
        );
        filter: blur(8px);
        opacity: 0.9;
        pointer-events: none;
      }

      .click-circle__inner {
        position: relative;
        width: 100%;
        height: 100%;
        border-radius: 999px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 200ms ease-out, transform 200ms ease-out;
      }

      .click-circle__mini {
        position: absolute;
        width: 40px;
        height: 40px;
        border-radius: 999px;
        background: #ffffff;
        color: #333;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.18);
        opacity: 0;
        transform: translate(0, 0) scale(0.6);
        pointer-events: none;
        transition: opacity 220ms ease-out, transform 220ms ease-out;
      }

      .click-circle__mini--work {
        right: 50%;
        bottom: 110%;
      }

      .click-circle__mini--game {
        right: 110%;
        bottom: 45%;
      }

      .click-circle__mini--chat {
        right: 90%;
        bottom: -10%;
      }

      .click-circle:hover .click-circle__inner {
        opacity: 0;
        transform: scale(0.8);
      }

      .click-circle:hover .click-circle__mini {
        opacity: 1;
        transform: translate(0, 0) scale(1);
      }

      .click-circle::after {
        content: "CLICKS";
        position: absolute;
        bottom: -26px;
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #888;
      }

      @keyframes breathe {
        0% {
          transform: scale(1);
          box-shadow: 0 10px 25px rgba(0, 0, 0, 0.16);
          filter: saturate(1.05);
        }
        50% {
          transform: scale(1.06);
          box-shadow: 0 14px 34px rgba(0, 0, 0, 0.14);
          filter: saturate(1.15);
        }
        100% {
          transform: scale(1);
          box-shadow: 0 10px 25px rgba(0, 0, 0, 0.16);
          filter: saturate(1.05);
        }
      }

      @keyframes diver-shake {
        0%   { transform: translate3d(0,0,0) rotate(0deg); }
        15%  { transform: translate3d(-5px,2px,0) rotate(-2deg); }
        30%  { transform: translate3d(6px,-3px,0) rotate(2deg); }
        45%  { transform: translate3d(-6px,2px,0) rotate(-1.5deg); }
        60%  { transform: translate3d(5px,-2px,0) rotate(1.5deg); }
        75%  { transform: translate3d(-3px,1px,0) rotate(-1deg); }
        100% { transform: translate3d(0,0,0) rotate(0deg); }
      }
      #diverImg.diver-shake {
        animation: diver-shake 320ms ease-out;
      }
        0% {
          transform: translate3d(0, 0, 0);
        }
        15% {
          transform: translate3d(-0.8px, 0, 0) rotate(-0.6deg);
        }
        30% {
          transform: translate3d(1.1px, 0, 0) rotate(0.6deg);
        }
        45% {
          transform: translate3d(-1.2px, 0, 0) rotate(-0.5deg);
        }
        60% {
          transform: translate3d(0.9px, 0, 0) rotate(0.5deg);
        }
        75% {
          transform: translate3d(-0.6px, 0, 0) rotate(-0.35deg);
        }
        100% {
          transform: translate3d(0, 0, 0);
        }
      }

      .click-circle__inner.shake {
        animation: circle-shake 200ms ease-out;
      }

      #portraitImg.shake, #portraitImg2.shake {
        animation: circle-shake 250ms ease-out;
      }

      .cover-flow {
        position: fixed;
        inset: 0;
        pointer-events: auto;
        background: radial-gradient(
            circle at 0% 0%,
            rgba(255, 255, 255, 0.3) 0,
            transparent 50%
          ),
          radial-gradient(
            circle at 80% 20%,
            rgba(255, 255, 255, 0.25) 0,
            transparent 55%
          ),
          linear-gradient(180deg, #03122a 0%, #072046 45%, #0a2a5e 100%);
        opacity: 0;
        /* 从右下角一气呵成地“流”满全屏 */
        clip-path: circle(0% at 100% 100%);
        transition: none;
        z-index: 999;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .cover-flow__inner {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .cover-flow__text {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        font-size: 32px;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.96);
        font-weight: 600;
        opacity: 0;
        transform: translateY(18px);
        text-align: center;
      }

      .cover-flow__text-sub {
        position: absolute;
        left: 46%;
        top: 56%;
        transform: translate(-50%, 14px);
        margin-top: 0;
        padding: 8px 26px;
        font-size: 16px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(27, 37, 46, 0.9);
        background: rgba(255, 255, 255, 0.96);
        border-radius: 999px;
        border: none;
        outline: none;
        cursor: pointer;
        opacity: 0;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.16);
        transition: transform 200ms ease-out, box-shadow 200ms ease-out;
      }

      .cover-flow__text-sub:hover {
        transform: translate(-50%, 10px);
        box-shadow: 0 14px 36px rgba(0, 0, 0, 0.24);
      }

      .cover-flow--active {
        animation: cover-flow-spread 2200ms cubic-bezier(0.25, 0.9, 0.25, 1)
          forwards;
      }

      .cover-flow--active .cover-flow__text {
        animation: cover-text-fade-in 2000ms ease-out 800ms forwards;
      }

      .cover-flow--active .cover-flow__text-sub {
        animation: cover-text-sub-fade-in 1800ms ease-out 1500ms forwards;
      }

      @keyframes cover-flow-spread {
        0% {
          opacity: 0;
          clip-path: circle(0% at 100% 100%);
        }
        100% {
          opacity: 1;
          clip-path: circle(150% at 100% 100%);
        }
      }

      @keyframes cover-text-fade-in {
        0% {
          opacity: 0;
          transform: translateY(18px);
        }
        60% {
          opacity: 1;
          transform: translateY(0);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes cover-text-sub-fade-in {
        0% {
          opacity: 0;
          transform: translateY(14px);
        }
        60% {
          opacity: 1;
          transform: translateY(0);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ── Deep sea bubbles ── */
      .bubble {
        position: fixed;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4), rgba(100,200,255,0.15));
        border: 1px solid rgba(168,244,216,0.3);
        pointer-events: none;
        z-index: 998;
        animation: bubbleRise linear infinite;
      }

      @keyframes bubbleRise {
        0%   { transform: translateY(0) translateX(0); opacity: 0.7; }
        100% { transform: translateY(-100vh) translateX(var(--drift, 0px)); opacity: 0; }
      }
    </style>
  </head>
  <body>

    <!-- Desktop Icons -->
    <style>
      .desktop {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 5;
      }

      .desktop-icon {
        position: absolute;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        width: 64px;
        cursor: pointer;
        pointer-events: all;
        user-select: none;
        padding: 4px;
        border-radius: 6px;
        transition: background 150ms;
      }

      .desktop-icon:hover {
        background: rgba(255,255,255,0.18);
      }

      .desktop-icon.selected {
        background: rgba(0,120,215,0.35);
      }

      .desktop-icon img {
        width: 52px;
        height: 52px;
        object-fit: contain;
        filter: drop-shadow(0 2px 6px rgba(0,0,0,0.35));
      }

      .desktop-icon span {
        font-size: 11px;
        color: #fff;
        text-align: center;
        line-height: 1.3;
        text-shadow: 0 1px 4px rgba(0,0,0,0.8), 0 0 8px rgba(0,0,0,0.5);
        word-break: break-word;
        max-width: 72px;
      }
    </style>

    <div class="desktop" id="desktop">
      <!-- Left column icons (top-left, going down) -->
      <div class="desktop-icon" style="left:16px;top:16px;" onclick="selectIcon(this)" ondblclick="openApp('search')">
        <img src="搜索栏截图.png" alt="Search">
        <span>Search</span>
      </div>
      <div class="desktop-icon" style="left:16px;top:106px;" onclick="selectIcon(this)" ondblclick="openApp('word')">
        <img src="图标/word图标.png" alt="Word">
        <span>Word</span>
      </div>
      <div class="desktop-icon" style="left:16px;top:196px;" onclick="selectIcon(this)">
        <img src="图标/ps图标.png" alt="Photoshop">
        <span>Photoshop</span>
      </div>
      <div class="desktop-icon" style="left:16px;top:286px;" onclick="selectIcon(this)">
        <img src="图标/ae图标.png" alt="After Effects">
        <span>After Effects</span>
      </div>
      <div class="desktop-icon" style="left:16px;top:376px;" onclick="selectIcon(this)">
        <img src="图标/figma图标.png" alt="Figma">
        <span>Figma</span>
      </div>
      <div class="desktop-icon" style="left:16px;top:466px;" onclick="selectIcon(this)">
        <img src="图标/cursor图标.png" alt="Cursor">
        <span>Cursor</span>
      </div>
      <div class="desktop-icon" style="left:16px;top:556px;" onclick="selectIcon(this)">
        <img src="图标/回收站图标.png" alt="回收站">
        <span>回收站</span>
      </div>

      <!-- Second column -->
      <div class="desktop-icon" style="left:100px;top:16px;" onclick="selectIcon(this)">
        <img src="图标/qq图标.png" alt="QQ">
        <span>QQ</span>
      </div>
      <div class="desktop-icon" style="left:100px;top:106px;" onclick="selectIcon(this)" ondblclick="openApp('wechat')">
        <img src="图标/微信图标.png" alt="WeChat">
        <span>微信</span>
      </div>
      <div class="desktop-icon" style="left:100px;top:196px;" onclick="selectIcon(this)">
        <img src="图标/腾讯会议图标.png" alt="腾讯会议">
        <span>腾讯会议</span>
      </div>
      <div class="desktop-icon" style="left:100px;top:286px;" onclick="selectIcon(this)">
        <img src="图标/百度网盘图标.png" alt="百度网盘">
        <span>百度网盘</span>
      </div>
      <div class="desktop-icon" style="left:100px;top:376px;" onclick="selectIcon(this)">
        <img src="图标/steam图标.png" alt="Steam">
        <span>Steam</span>
      </div>
      <div class="desktop-icon" style="left:100px;top:466px;" onclick="selectIcon(this); openApp('oceanTiming')">
        <img src="图标/OCEAN TIMING.png" alt="OCEAN TIMING">
        <span>THE DEPTHS</span>
      </div>
    </div>

    <script>
      function selectIcon(el) {
        document.querySelectorAll('.desktop-icon').forEach(i => i.classList.remove('selected'));
        el.classList.add('selected');
        setTimeout(() => el.classList.remove('selected'), 2000);
      }

      function openApp(app) {
        const modal = document.getElementById('appModal');
        const img = document.getElementById('appModalImg');
        const video = document.getElementById('appModalVideo');
        const title = document.getElementById('appModalTitle');
        const wechatInput = document.getElementById('wechatInput');
        const wordOverlay = document.getElementById('wordOverlay');

        // Reset
        wechatInput.style.display = 'none';
        wordOverlay.style.display = 'none';
        img.className = '';
        img.style.height = 'auto';
        img.style.objectPosition = '';
        img.style.display = 'block';
        img.onclick = null;
        img.dataset.clickCount = '0';
        video.pause();
        video.currentTime = 0;
        video.removeAttribute('src');
        video.style.display = 'none';

        if (app === 'search') {
          img.src = '搜索栏截图.png';
          title.textContent = 'Search';
          img.onclick = function() {
            img.src = '搜索栏截图2.jpg';
          };
        } else if (app === 'wechat') {
          img.src = '微信/微信截图.png';
          title.textContent = '微信';
          img.style.display = 'block';
          img.style.width = '100%';
          img.style.height = 'auto';
          img.style.minHeight = 'auto';
          img.style.background = '#ffffff';
          wechatInput.style.display = 'flex';
          wechatInput.style.position = 'absolute';
          wechatInput.style.right = '0';
          wechatInput.style.bottom = '0';
          wechatInput.style.width = '64.5%';
          wechatInput.style.height = '24%';
          img.onload = function(){};
          img.onerror = function(){
            img.alt = '微信图片加载失败';
            img.style.minHeight = '420px';
          };
          img.onclick = function() {
            const n = parseInt(img.dataset.clickCount || '0', 10) + 1;
            img.dataset.clickCount = String(n);
            if (n === 1) img.src = '微信/微信截图2.png';
            else if (n === 2) img.src = '微信/微信截图3.png';
            else if (n === 3) img.src = '微信/微信放大.jpg';
            else img.src = '微信/微信放大2.jpg';
          };
          setTimeout(() => document.getElementById('wechatInputBox').focus(), 100);
        } else if (app === 'word') {
          img.src = 'word截图.png';
          title.textContent = 'Microsoft Word';
          wordOverlay.style.display = 'block';
          img.onclick = function() {
            img.src = 'word2.jpg';
          };
          setTimeout(() => document.getElementById('wordInputBox').focus(), 100);
        } else if (app === 'stardew') {
          img.src = '星露谷截图.png';
          img.className = 'crop-right';
          img.style.height = '520px';
          img.style.objectPosition = 'left center';
          title.textContent = '星露谷物语';
          img.onclick = function(e) { spawnBalls(e); };
        } else if (app === 'oceanTiming') {
          title.textContent = 'THE DEPTHS';
          img.style.display = 'none';
          video.style.display = 'block';
          video.src = '前视频.mp4';
          video.play().catch(() => {});
        }
        modal.style.display = 'flex';
      }

      function closeApp() {
        const video = document.getElementById('appModalVideo');
        video.pause();
        video.currentTime = 0;
        document.getElementById('appModal').style.display = 'none';
      }

      function spawnBalls(e) {
        const rect = e.currentTarget.getBoundingClientRect();
        const x = e.clientX;
        const y = e.clientY;
        const colors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff922b','#cc5de8','#f06595'];
        const count = 8 + Math.floor(Math.random() * 6);
        for (let i = 0; i < count; i++) {
          const ball = document.createElement('div');
          const size = 10 + Math.random() * 18;
          const color = colors[Math.floor(Math.random() * colors.length)];
          const angle = (Math.PI * 2 / count) * i + Math.random() * 0.4;
          const speed = 60 + Math.random() * 80;
          const vx = Math.cos(angle) * speed;
          const vy = Math.sin(angle) * speed - 40;
          ball.style.cssText = [
            'position:fixed',
            'left:' + (x - size/2) + 'px',
            'top:' + (y - size/2) + 'px',
            'width:' + size + 'px',
            'height:' + size + 'px',
            'border-radius:50%',
            'background:' + color,
            'pointer-events:none',
            'z-index:9999',
            'opacity:1',
            'transition:none',
          ].join(';');
          document.body.appendChild(ball);
          let startTime = null;
          const duration = 600 + Math.random() * 400;
          function animate(ts) {
            if (!startTime) startTime = ts;
            const elapsed = ts - startTime;
            const t = elapsed / duration;
            if (t >= 1) { ball.remove(); return; }
            const gravity = 120;
            const cx = x - size/2 + vx * t;
            const cy = y - size/2 + vy * t + 0.5 * gravity * t * t;
            ball.style.left = cx + 'px';
            ball.style.top  = cy + 'px';
            ball.style.opacity = 1 - t;
            ball.style.transform = 'scale(' + (1 - t * 0.5) + ')';
            requestAnimationFrame(animate);
          }
          requestAnimationFrame(animate);
        }
      }

      document.getElementById('desktop').addEventListener('click', function(e) {
        if (e.target === this) {
          document.querySelectorAll('.desktop-icon').forEach(i => i.classList.remove('selected'));
        }
      });
    </script>

    <!-- App Window Modal -->
    <style>

        inset: 0;
        z-index: 500;
        align-items: center;
        justify-content: center;
        background: transparent;

    <div class="app-modal" id="appModal" onclick="if(event.target===this)closeApp()">
      <div class="app-window">
        <div class="app-window__titlebar">
          <div class="app-window__controls">
            <button class="app-window__btn app-window__btn--close" onclick="closeApp()"></button>
            <button class="app-window__btn app-window__btn--min"></button>
            <button class="app-window__btn app-window__btn--max"></button>
          </div>
          <div class="app-window__title" id="appModalTitle"></div>
          <div style="width:46px"></div>
        </div>
        <div class="app-window__body">
          <img id="appModalImg" src="" alt="app screenshot">
          <video id="appModalVideo" style="display:none; width:100%; height:auto; background:#000;" controls autoplay playsinline></video>
          <!-- Word typing overlay -->
          <div id="wordOverlay" style="display:none; position:absolute; top:30%; left:21.5%; width:72%; height:62%; z-index:10;">
            <div
              id="wordInputBox"
              contenteditable="true"
              style="width:100%; height:100%; background:rgba(255,255,255,0.01); border:none; outline:none; font-size:14px; font-family:'宋体',serif; line-height:1.8; color:#222; padding:8px; overflow-y:auto; cursor:text;"></div>
          </div>
          <!-- WeChat chat input overlay -->
          <div id="wechatInput" style="display:none; position:absolute; bottom:0; right:0; width:64.5%; height:24%; background:#f5f5f5; border-left:1px solid #e0e0e0; border-top:1px solid #e0e0e0; border-radius:8px 0 0 0; padding:10px 10px 8px; box-shadow:-2px -2px 10px rgba(0,0,0,0.1); flex-direction:column; z-index:20;">
            <div style="display:flex; gap:8px; margin-bottom:8px; font-size:18px;">
              <span style="cursor:pointer;">😊</span>
              <span style="cursor:pointer;">📁</span>
              <span style="cursor:pointer;">🖼️</span>
            </div>
            <div
              id="wechatInputBox"
              contenteditable="true"

    <script>
      function sendWechatMsg() {
        const box = document.getElementById('wechatInputBox');
        box.innerHTML = '';
        box.focus();
      }

      // WeChat send button activation
      document.addEventListener('DOMContentLoaded', function() {
        const tableBgm = document.getElementById('tableBgm');
        let bgmFadeStarted = false;
        function fadeOutTableBgm() {
          if (!tableBgm || bgmFadeStarted) return;
          bgmFadeStarted = true;
          const fadeDuration = 2000;
          const fadeStepMs = 100;
          const startVolume = tableBgm.volume;
          let elapsed = 0;
          const fadeTimer = setInterval(function() {
            elapsed += fadeStepMs;
            const progress = Math.min(elapsed / fadeDuration, 1);
            tableBgm.volume = Math.max(startVolume * (1 - progress), 0);
            if (progress >= 1) {
              clearInterval(fadeTimer);
              tableBgm.pause();
              tableBgm.currentTime = 0;
            }
          }, fadeStepMs);
        }
        function tryPlayTableBgm() {
          if (!tableBgm) return;
          const playPromise = tableBgm.play();
          if (playPromise && typeof playPromise.catch === 'function') {
            playPromise.catch(function() {});
          }
        }
        tryPlayTableBgm();
        setTimeout(fadeOutTableBgm, 5000);
        window.addEventListener('pointerdown', function() {
          tryPlayTableBgm();
          setTimeout(fadeOutTableBgm, 5000);
        }, { once: true });
        const box = document.getElementById('wechatInputBox');
        const btn = document.getElementById('wechatSendBtn');
        if (box && btn) {
          box.addEventListener('input', function() {
            if (box.innerText.trim().length > 0) {
              btn.style.background = '#07c160';
              btn.style.color = '#fff';
            } else {
              btn.style.background = '#d9d9d9';
              btn.style.color = '#888';
            }
          });
          box.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
              e.preventDefault();
              sendWechatMsg();
            }
          });
        }
      });
    </script>

                  st.innerHTML = 'E<span style="font-size:1.25em;">M</span><span style="font-size:.85em;">M</span><span style="font-size:1.05em;">M</span>....';
                  setTimeout(() => {
                    st.style.animation = 'none';
                    void st.offsetWidth;
                    st.style.animation = 'textShake 260ms ease-out 1';
                    st.innerHTML += '<br><span style="font-size:1.05em;">IT</span> <span style="font-size:.9em;">SEEMS</span> <span style="font-size:1.06em;">YOU</span> <span style="font-size:.9em;">LIKE</span><br><span style="font-size:1.02em;">READING</span> <span style="font-size:.9em;">THINGS</span> <span style="font-size:1.04em;">LIKE</span> <span style="font-size:.92em;">THIS...</span>';
                  }, 3000);
                  setTimeout(() => {
                    st.style.animation = 'none';
                    void st.offsetWidth;
                    st.style.animation = 'textShake 260ms ease-out 1';
                    st.innerHTML += '<br><span style="font-size:1.18em;">LET\'S</span> <span style="font-size:.92em;">SEE</span> <span style="font-size:1.18em;">THIS</span> <span style="font-size:.95em;">STORY</span>';
                  }, 7200);
                  // 全部出现后停留 2s，再慢慢黑屏
                  setTimeout(() => {
                    videoDarkOverlay.style.transition = 'opacity 2200ms ease-in-out';
                    videoDarkOverlay.style.opacity = '1';
                  }, 9200);
                  setTimeout(() => { st.style.opacity = '0'; }, 9400);
                }, 1250);
              }
            }, zoomDuration + 60);

            setTimeout(() => {
              window.location.href = nextPage;
            }, zoomDuration + 12200);
          }
        }

        function updateVideoPhase() {
          if (!videoUnlocked || expansionStarted) return;
          if (video.currentTime >= zoomStartTime) {
            startZoomToBlack();
          }
        }

        function spawnErrorWechatFlood() {
          const flood = document.createElement('div');
          flood.id = 'wechatFlood';
          flood.style.cssText = [
            'position:fixed',
            'inset:0',
            'z-index:50000',
            'pointer-events:none'
          ].join(';');
          document.body.appendChild(flood);

          const total = 44;
          const floodDuration = 3000;
          const holdMs = 1000;

          function addOne() {
            const w = document.createElement('div');
            w.style.cssText = [
              'position:absolute',
              'width:min(520px,38vw)',
              'height:min(360px,32vh)',
              'background:#f3f3f3',
              'border-radius:10px',
              'box-shadow:0 20px 60px rgba(0,0,0,0.55)',
              'overflow:hidden',
              'left:' + Math.round(Math.random()*82) + 'vw',
              'top:' + Math.round(Math.random()*74) + 'vh',
              'transform:translate3d(0,0,0) scale(0.94)',
              'opacity:0',
              'transition:opacity 160ms ease, transform 160ms ease'
            ].join(';');

            const bar = document.createElement('div');
            bar.style.cssText = 'height:38px;background:#e8e8e8;border-bottom:1px solid #d0d0d0;';
            const body = document.createElement('div');
            body.style.cssText = 'position:absolute;inset:38px 0 0 0;background:#111;display:flex;align-items:center;justify-content:center;';
            const img = document.createElement('img');
            img.src = '微信/微信放大2.jpg';
            img.style.cssText = 'max-width:100%;max-height:100%;width:100%;height:100%;object-fit:contain;display:block;';
            body.appendChild(img);
            w.appendChild(bar);
            w.appendChild(body);
            flood.appendChild(w);

            requestAnimationFrame(() => {
              w.style.opacity = '1';
              w.style.transform = 'translate3d(0,0,0) scale(1)';
            });
          }

          let created = 0;
          const timer = setInterval(() => {
            addOne();
            created++;
            if (created >= total) {
              clearInterval(timer);
            }
          }, Math.floor(floodDuration / total));

          setTimeout(() => {
            // 铺满后定格 1 秒，再集体震动 2 秒后统一消失
            clearInterval(timer);
            setTimeout(() => {
              flood.style.animation = 'floodShake 2000ms ease-in-out 1';
              setTimeout(() => {
                // “一瞬间”消失 + 关闭微信窗口 + 自动播放视频
                flood.remove();
                startupWechat.style.display = 'none';
                maybeStartVideo();
              }, 2000);
            }, holdMs);
          }, floodDuration);
        }

        document.addEventListener('click', function (e) {
          const clickInWindow = e.target.closest('.startup-window');
          const clickOnIcon = e.target.closest('.desktop-icon');
          if (clickInWindow || clickOnIcon) return;

          if (startupSearch.style.display !== 'none') {
            startupSearch.style.display = 'none';
            maybeStartVideo();
            return;
          }

          if (startupWord.style.display !== 'none') {
            startupWord.style.display = 'none';
            maybeStartVideo();
            return;
          }

          if (startupWechat.style.display !== 'none') {
            startupWechat.style.display = 'none';
            maybeStartVideo();
          }
        });

        video.addEventListener('timeupdate', updateVideoPhase);
        video.addEventListener('ended', startZoomToBlack);
      })();
    </script>

    <!-- Sticky note cursor -->
    <style>
      .sticky-cursor {
        position: fixed;
        width: 160px;
        height: 160px;
        pointer-events: none;
        z-index: 9999;
        transform: translate(-10px, -10px) rotate(-6deg);
        filter: drop-shadow(3px 5px 10px rgba(0,0,0,0.3));
        display: none;
      }

      .sticky-cursor canvas {
        width: 160px;
        height: 160px;
        border-radius: 4px;
      }

      .sticky-note {
        position: absolute;
        width: 160px;
        height: 160px;
        border-radius: 4px;
        background: #faf6e9;
        overflow: visible;
        box-shadow: 4px 6px 16px rgba(0,0,0,0.22);
        cursor: pointer;
        z-index: 200;
      }

      .sticky-note__tape {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 22px;
        border-radius: 4px 4px 0 0;
        z-index: 2;
      }

      .sticky-note__img {
        position: absolute;
        top: 22px;
        left: 0;
        width: 160px;
        height: 138px;
        object-fit: cover;
        border-radius: 0 0 4px 4px;
        display: block;
        background: #faf6e9;
      }

      .sticky-note__close {
        position: absolute;
        top: -10px;
        right: -10px;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: #fff;
        border: 2px solid #ccc;
        font-size: 14px;
        line-height: 22px;
        text-align: center;
        cursor: pointer;
        display: none;
        z-index: 10;
        color: #666;
        box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      }

      .sticky-note:hover .sticky-note__close {
        display: block;
      }

      body.sticky-mode {
        cursor: none !important;
      }

      body.sticky-mode * {
        cursor: none !important;
      }
    </style>

    <div class="sticky-cursor" id="stickyCursor">
      <canvas id="stickyPreview" width="160" height="160"></canvas>
    </div>

    <script>
      (function() {
        const drawing = localStorage.getItem('lastDrawing');
        if (!drawing) return;

        const stickyCursor = document.getElementById('stickyCursor');
        const stickyPreview = document.getElementById('stickyPreview');
        const ctx = stickyPreview.getContext('2d');
        const body = document.body;

        const tapeColors = [
          'rgba(255, 200, 100, 0.85)',
          'rgba(180, 220, 255, 0.85)',
          'rgba(200, 255, 180, 0.85)',
          'rgba(255, 180, 200, 0.85)',
          'rgba(220, 180, 255, 0.85)',
          'rgba(255, 240, 150, 0.85)',
        ];

        function randomTapeColor() {
          return tapeColors[Math.floor(Math.random() * tapeColors.length)];
        }

        const chosenColor = randomTapeColor();

        const img = new Image();
        img.onload = function() {
          // Paper background
          ctx.fillStyle = '#faf6e9';
          ctx.fillRect(0, 0, 160, 160);
          // Drawing
          ctx.drawImage(img, 0, 22, 160, 138);
          // Tape strip
          ctx.fillStyle = chosenColor;
          ctx.fillRect(0, 0, 160, 22);

          stickyCursor.style.display = 'block';
          body.classList.add('sticky-mode');
        };
        img.src = drawing;

        const mouseMoveHandler = function(e) {
          stickyCursor.style.left = e.clientX + 'px';
          stickyCursor.style.top = e.clientY + 'px';
        };
        document.addEventListener('mousemove', mouseMoveHandler);

        document.addEventListener('click', function(e) {
          if (e.target.closest('.click-circle') || e.target.closest('.modal') || e.target.closest('.cover-flow')) return;

          // Create sticky note
          const note = document.createElement('div');
          note.className = 'sticky-note';
          note.style.left = (e.clientX - 10) + 'px';
          note.style.top = (e.clientY - 10) + 'px';
          note.style.transform = 'rotate(' + (Math.random() * 14 - 7) + 'deg)';

          const tape = document.createElement('div');
          tape.className = 'sticky-note__tape';
          tape.style.background = chosenColor;

          const noteImg = document.createElement('img');
          noteImg.className = 'sticky-note__img';
          noteImg.src = drawing;

          const closeBtn = document.createElement('div');
          closeBtn.className = 'sticky-note__close';
          closeBtn.textContent = '×';
          closeBtn.addEventListener('click', function(ev) {
            ev.stopPropagation();
            note.remove();
          });

          note.appendChild(tape);
          note.appendChild(noteImg);
          note.appendChild(closeBtn);
          document.body.appendChild(note);

          // Restore cursor
          localStorage.removeItem('lastDrawing');
          stickyCursor.style.display = 'none';
          body.classList.remove('sticky-mode');
          document.removeEventListener('mousemove', mouseMoveHandler);
        }, { once: true });
      })();
    </script>

    </div>

    <script>
      (function() {
        const stickyType = localStorage.getItem('stickyType');
        if (!stickyType) return;

        const emojiMap = {
          music:     { emoji: '🎵', tape: 'rgba(255, 200, 100, 0.85)' },
          painting:  { emoji: '🎨', tape: 'rgba(200, 180, 255, 0.85)' },
          breathing: { emoji: '🌊', tape: 'rgba(100, 200, 240, 0.85)' },
        };

        const config = emojiMap[stickyType];
        if (!config) return;

        const cursor = document.getElementById('emojiStickyCursor');
        const tape   = document.getElementById('emojiStickyTape');
        const body   = document.getElementById('emojiStickyBody');
        const docBody = document.body;

        tape.style.background = config.tape;
        body.textContent = config.emoji;
        cursor.style.display = 'block';
        docBody.classList.add('sticky-mode');

        const moveHandler = function(e) {
          cursor.style.left = e.clientX + 'px';
          cursor.style.top  = e.clientY + 'px';
        };
        document.addEventListener('mousemove', moveHandler);

        document.addEventListener('click', function(e) {
          if (e.target.closest('.click-circle') || e.target.closest('.cover-flow')) return;

          const tapeColors = [
            'rgba(255, 200, 100, 0.85)',
            'rgba(180, 220, 255, 0.85)',
            'rgba(200, 255, 180, 0.85)',
            'rgba(255, 180, 200, 0.85)',
            'rgba(220, 180, 255, 0.85)',
            'rgba(255, 240, 150, 0.85)',
          ];
          const noteColor = config.tape;

          const note = document.createElement('div');
          note.style.cssText = [
            'position:absolute',
            'width:160px',
            'height:160px',
            'border-radius:4px',
            'background:#faf6e9',
            'overflow:visible',
            'box-shadow:4px 6px 16px rgba(0,0,0,0.22)',
            'cursor:pointer',
            'z-index:200',
            'left:' + (e.clientX - 10) + 'px',
            'top:'  + (e.clientY - 10) + 'px',
            'transform:rotate(' + (Math.random() * 14 - 7) + 'deg)',
          ].join(';');

          const noteTape = document.createElement('div');
          noteTape.style.cssText = 'position:absolute;top:0;left:0;right:0;height:22px;border-radius:4px 4px 0 0;background:' + noteColor + ';z-index:2;';

          const noteEmoji = document.createElement('div');
          noteEmoji.style.cssText = 'position:absolute;top:22px;left:0;width:160px;height:138px;display:flex;align-items:center;justify-content:center;font-size:64px;line-height:1;';
          noteEmoji.textContent = config.emoji;

          const closeBtn = document.createElement('div');
          closeBtn.style.cssText = 'position:absolute;top:-10px;right:-10px;width:26px;height:26px;border-radius:50%;background:#fff;border:2px solid #ccc;font-size:14px;line-height:22px;text-align:center;cursor:pointer;display:none;z-index:10;color:#666;box-shadow:0 2px 6px rgba(0,0,0,0.15);';
          closeBtn.textContent = '×';
          closeBtn.addEventListener('click', function(ev) {
            ev.stopPropagation();
            note.remove();
          });
          note.addEventListener('mouseenter', () => closeBtn.style.display = 'block');
          note.addEventListener('mouseleave', () => closeBtn.style.display = 'none');

          note.appendChild(noteTape);
          note.appendChild(noteEmoji);
          note.appendChild(closeBtn);
          document.body.appendChild(note);

          localStorage.removeItem('stickyType');
          cursor.style.display = 'none';
          docBody.classList.remove('sticky-mode');
          document.removeEventListener('mousemove', moveHandler);
        }, { once: true });
      })();
    </script>
